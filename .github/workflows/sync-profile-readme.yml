name: Sync profile README

on:
  push:
    branches: [main]
    paths:
      - GITHUB_README.md
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout career
        uses: actions/checkout@v4

      - name: Push README to Brandonminer333/Brandonminer333
        env:
          DEPLOY_KEY: ${{ secrets.PROFILE_README_DEPLOY_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${DEPLOY_KEY}" ]]; then
            echo "PROFILE_README_DEPLOY_KEY secret is not configured." >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          echo "${DEPLOY_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # #region agent log
          KEY_LINES=$(wc -l < ~/.ssh/deploy_key | tr -d ' ')
          KEY_BYTES=$(wc -c < ~/.ssh/deploy_key | tr -d ' ')
          KEY_BEGIN=$(head -1 ~/.ssh/deploy_key)
          KEY_END=$(tail -1 ~/.ssh/deploy_key)
          echo "debug deploy_key lines=${KEY_LINES} bytes=${KEY_BYTES}"
          echo "debug deploy_key begin=${KEY_BEGIN}"
          echo "debug deploy_key end=${KEY_END}"
          if ssh-keygen -l -f ~/.ssh/deploy_key >/tmp/deploy_key_probe.out 2>/tmp/deploy_key_probe.err; then
            echo "debug ssh-keygen ok: $(cat /tmp/deploy_key_probe.out)"
          else
            echo "debug ssh-keygen failed: $(cat /tmp/deploy_key_probe.err)"
          fi
          # #endregion

          ssh-keyscan github.com >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND='ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes'

          git clone --depth 1 git@github.com:Brandonminer333/Brandonminer333.git target
          cp GITHUB_README.md target/README.md

          cd target
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md

          if git diff --staged --quiet; then
            echo "Profile README already up to date."
            exit 0
          fi

          git commit -m "Sync profile README from career"
          git push
